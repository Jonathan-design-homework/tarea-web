<body>
    <form>
        <center><fieldset style="width: 24%;">
        <label for="tipoDocumento">Tipo documento</label><br>
        <select id="tipoDocumento" name="tipoDocumento">
            <option value="tarjetaIdentidad">Tarjeta de Identidad</option>
            <option value="cedula">Cédula</option>
            <option value="pasaporte">Pasaporte</option>
        </select><br><br>

        <label for="nombres">Nombres</label><br>
        <input type="text" id="nombres" name="nombres" value="Maria"><br><br>

        <label for="apellidos">Apellidos</label><br>
        <input type="text" id="apellidos" name="apellidos" value="Perez"><br><br>

        <label>Genero:</label><br>
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="masculino">Masculino</label><br>
        <input type="radio" id="femenino" name="genero" value="femenino" checked>
        <label for="femenino">Femenino</label><br><br>

        <label for="descripcion">Descripción:</label><br>
        <textarea id="descripcion" name="descripcion" rows="3" cols="20">Software Development</textarea><br><br>

        <button type="submit">Cargar Información</button>
    </form>
    </fieldset></center>
